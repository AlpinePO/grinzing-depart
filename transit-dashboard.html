<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vienna Transit Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #2a2f42;
    --accent: #f5a623;
    --accent2: #4a9eff;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --early: #34c26a;
    --late: #ff4d4d;
    --on-time: #7a8099;
    --transfer: #a78bfa;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .wl-logo {
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: bold;
    padding: 4px 8px;
    letter-spacing: 1px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .clock {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--early);
    animation: pulse 2s infinite;
  }
  .status-dot.error { background: var(--late); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 0.5px;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .last-fetch {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Main layout */
  .main {
    padding: 20px 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* Group heading */
  .group-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 24px 0 12px;
    padding-left: 4px;
    border-left: 3px solid var(--accent);
    padding-left: 10px;
  }

  /* Departure card (one per departure time) */
  .dep-card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .dep-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .dep-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .dep-time {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .dep-delta {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: bold;
  }
  .dep-delta.early { color: var(--early); }
  .dep-delta.late { color: var(--late); }
  .dep-delta.ontime { color: var(--on-time); }

  .dep-line-badge {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--accent2);
    color: #000;
    padding: 2px 7px;
    font-weight: bold;
    letter-spacing: 1px;
    margin-left: auto;
  }

  /* Route block within a departure */
  .route-block {
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
  }
  .route-block:last-child { border-bottom: none; }

  .route-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .route-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 3px 8px;
    background: var(--accent);
    color: #000;
  }

  .route-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .route-summary {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    letter-spacing: 1px;
  }

  /* Segment table */
  .seg-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .seg-table th {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    padding: 4px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .seg-table td {
    padding: 6px 8px;
    border-bottom: 1px dotted var(--border);
    vertical-align: middle;
  }

  .seg-table tr:last-child td { border-bottom: none; }

  .seg-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }

  .seg-line {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .time-cell {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
  }

  .time-delta {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: bold;
    margin-left: 4px;
  }
  .time-delta.early { color: var(--early); }
  .time-delta.late { color: var(--late); }

  /* Transfer row */
  .transfer-row td {
    background: #16141f;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
  }

  .transfer-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--transfer);
    text-transform: uppercase;
    font-weight: 600;
  }

  .transfer-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--transfer);
    text-align: right;
  }

  /* No valid routes */
  .no-routes {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    padding: 8px 0;
  }

  /* Loading / error */
  .status-bar {
    text-align: center;
    padding: 40px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: var(--late);
    font-family: var(--mono);
    font-size: 12px;
    padding: 20px;
    border: 1px solid var(--late);
    margin: 20px 0;
    background: #1a0e0e;
  }

  @media (max-width: 600px) {
    .clock { font-size: 17px; }
    .dep-time { font-size: 16px; }
    .seg-table th, .seg-table td { padding: 4px 5px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="wl-logo">WL</div>
    <div class="header-title">Grinzing → Praterstern</div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="status-dot"></div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="last-fetch" id="last-fetch">—</div>
    <button class="refresh-btn" onclick="fetchData()">↻ Refresh</button>
  </div>
</div>

<div class="main" id="main">
  <div class="status-bar"><span class="spinner"></span>Loading...</div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────

const API_URL = 'https://proxy.cors.sh/';
const CORS_HEADERS = {
  'x-cors-api-key': 'temp_2a400d8f9a241d99c1d834dd2de227a1',
  'Origin': 'https://alpinepo.github.io'
};
const REFRESH_MS = 5 * 60 * 1000;

// Only departure stopIDs needed — arrivals are calculated via scheduled duration offsets
const ALL_STOP_IDS = [
  873,   // Grinzing 38A (start R1, R2)
  4402,  // Heiligenstadt U4 departure
  4214,  // Schottenring U2 departure
  4113,  // Schwedenplatz U1 departure
  1221,  // Grinzing 38 (start R3)
  1288   // Oberdöbling S45 departure
];

// Route definitions
const ROUTES = [
  {
    id: 'R1',
    name: 'Bus - U2',
    startStop: 873,
    startLine: '38A',
    segments: [
      {
        name: 'Grinzing → Heiligenstadt',
        line: '38A',
        depStop: 873,
        arrStop: 826,
        label: 'Bus 38A'
      },
      {
        name: 'Heiligenstadt → Schottenring',
        line: 'U4',
        depStop: 4402,
        arrStop: 4408,
        label: 'U4',
        transferFromPrev: 4  // min allowable between prev arrStop and this depStop
      },
      {
        name: 'Schottenring → Praterstern',
        line: 'U2',
        depStop: 4214,
        arrStop: 4263,
        label: 'U2',
        transferFromPrev: 4
      }
    ]
  },
  {
    id: 'R2',
    name: 'Bus - U1',
    startStop: 873,
    startLine: '38A',
    segments: [
      {
        name: 'Grinzing → Heiligenstadt',
        line: '38A',
        depStop: 873,
        arrStop: 826,
        label: 'Bus 38A'
      },
      {
        name: 'Heiligenstadt → Schwedenplatz',
        line: 'U4',
        depStop: 4402,
        arrStop: 4410,
        label: 'U4',
        transferFromPrev: 4
      },
      {
        name: 'Schwedenplatz → Praterstern',
        line: 'U1',
        depStop: 4113,
        arrStop: 4117,
        label: 'U1',
        transferFromPrev: 4
      }
    ]
  },
  {
    id: 'R3',
    name: 'Straßenbahn - S45',
    startStop: 1221,
    startLine: '38',
    segments: [
      {
        name: 'Grinzing → Oberdöbling',
        line: '38',
        depStop: 1221,
        arrStop: 1226,
        label: 'Tram 38'
      },
      {
        name: 'Oberdöbling → Handelskai',
        line: 'S45',
        depStop: 1288,
        arrStop: 4648,
        label: 'S45',
        transferFromPrev: 3
      },
      {
        name: 'Handelskai → Praterstern',
        line: 'MAINLINE',
        depStop: 4648,
        arrStop: 1290201,
        label: 'ÖBB',
        transferFromPrev: 3
      }
    ]
  }
];

// Group A: Routes 1 & 2 (start 873), Group B: Route 3 (start 1221)
const GROUP_A = ['R1', 'R2'];
const GROUP_B = ['R3'];

// ─── STATE ────────────────────────────────────────────────────────────────────

let stopData = {}; // stopId -> { lines: [...] }

// ─── CLOCK ────────────────────────────────────────────────────────────────────

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ─── FETCH ────────────────────────────────────────────────────────────────────

// ÖBB IBNR station IDs for S45 stops (not served by Wiener Linien API)
const OEBB_STOPS = {
  1288: '1291904',  // Wien Oberdöbling Bahnhst (S45 departure stop)
  4648: '8100349'   // Wien Handelskai (departures to Praterstern and beyond)
};
// Lines that pass through Handelskai towards Praterstern
const HANDELSKAI_LINES = ['REX1','S1','S7','S4','S2','REX3','CJX9','S3'];
const HANDELSKAI_DIRECTIONS = [
  'mödling', 'meidling', 'payerbach', 'airport', 'wr.neustadt', 'wiener neustadt'
];
const OEBB_API = 'https://v6.oebb.transport.rest/api';

// Fetch one Wiener Linien stop
async function fetchWLStop(stopId) {
  const ts = Date.now();
  const url = API_URL + `https://www.wienerlinien.at/ogd_realtime/monitor?stopId=${stopId}&_=${ts}`;
  const res = await fetch(url, { headers: CORS_HEADERS });
  if (!res.ok) throw new Error(`HTTP ${res.status} for WL stop ${stopId}`);
  return res.json();
}

// Fetch one ÖBB stop and normalise into the same line/departure structure
// used by stopData, so getDepartures() works without modification.
// ÖBB response: { departures: [{ when, plannedWhen, delay, line: { name }, direction }] }
// We only want S45 departures in the towards-Handelskai direction.
async function fetchOebbStop(wlStopId) {
  const ibnr = OEBB_STOPS[wlStopId];
  const url = API_URL + `${OEBB_API}/stops/${ibnr}/departures?results=20&duration=90&suburban=true`;
  const res = await fetch(url, { headers: CORS_HEADERS });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ÖBB stop ${ibnr}`);
  const json = await res.json();

  // Normalise ÖBB departures into WL-compatible line objects keyed by line name
  const lineMap = {};
  for (const dep of (json.departures ?? [])) {
    const name = dep.line?.name ?? '';
    if (!name) continue;

    // DEBUG: log line name and direction so we can confirm exact strings
    console.log('ÖBB dep:', name, '|', dep.direction);

    // Normalise line name: strip spaces and train number suffix
    // e.g. "S 45 (Train-No. 92893)" -> "S45"
    const normName = name.replace(/\s+/g, '').replace(/\(.*\)$/, '');

    // For stopID 1288 (Oberdöbling) only keep S45 towards Handelskai
    if (wlStopId === 1288 && normName !== 'S45') continue;
    if (wlStopId === 1288 && dep.direction &&
        !dep.direction.toLowerCase().includes('handelskai')) continue;

    // For stopID 4648 (Handelskai) only keep mainline trains towards Praterstern
    if (wlStopId === 4648) {
      if (!HANDELSKAI_LINES.includes(normName)) continue;
      if (dep.direction) {
        const dir = dep.direction.toLowerCase();
        const validDir = HANDELSKAI_DIRECTIONS.some(d => dir.includes(d));
        if (!validDir) continue;
      }
    }

    // Store under normalised name so getDepartures('S45') finds it
    const storeKey = normName;
    if (!lineMap[storeKey]) {
      lineMap[storeKey] = {
        name: storeKey,
        departures: { departure: [] }
      };
    }
    lineMap[storeKey].departures.departure.push({
      departureTime: {
        timePlanned: dep.plannedWhen ?? dep.when,
        timeReal:    dep.when ?? dep.plannedWhen,
        countdown:   dep.delay != null ? Math.round(dep.delay / 60) : 0
      }
    });
  }
  return Object.values(lineMap);
}

async function fetchData() {
  setStatus(null, 'Loading');
  try {
    // Wiener Linien stops — split into 2 batches to respect cors.sh rate limit
    const wlBatch1 = ALL_STOP_IDS.slice(0, 3);
    const wlBatch2 = ALL_STOP_IDS.slice(3);

    const [wlResults1, wlResults2, oebbOberdoebling, oebbHandelskai] = await Promise.all([
      Promise.all(wlBatch1.map(fetchWLStop)),
      Promise.all(wlBatch2.map(fetchWLStop)),
      fetchOebbStop(1288),   // Oberdöbling S45 departures
      fetchOebbStop(4648)    // Handelskai mainline departures towards Praterstern
    ]);

    const allWlResults = [...wlResults1, ...wlResults2];

    stopData = {};

    // Store Wiener Linien results
    ALL_STOP_IDS.forEach((sid, i) => {
      const monitors = allWlResults[i]?.data?.monitors ?? [];
      const lines = [];
      monitors.forEach(m => (m.lines ?? []).forEach(l => lines.push(l)));
      stopData[sid] = lines;
    });

    // Store ÖBB results under their internal keys so route logic finds them normally
    stopData[1288] = oebbOberdoebling;
    stopData[4648] = oebbHandelskai;

    renderAll();
    const t = new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('last-fetch').textContent = `↻ ${t}`;
    setStatus(true, 'Live');
  } catch (e) {
    setStatus(false, e.message);
    document.getElementById('last-fetch').textContent = '⚠ ' + e.message;
  }
}

function setStatus(ok, msg) {
  const dot = document.getElementById('status-dot');
  if (ok === null) { dot.className = 'status-dot'; dot.style.background = 'var(--accent)'; }
  else if (ok) { dot.className = 'status-dot'; dot.style.background = 'var(--early)'; }
  else { dot.className = 'status-dot error'; dot.style.background = 'var(--late)'; }
}

// ─── SCHEDULED DURATIONS (minutes) ───────────────────────────────────────────
// Keyed by "depStop->arrStop", used to calculate arrival times from departure times
const DURATIONS = {
  '873->826':   9,   // 38A  Grinzing → Heiligenstadt
  '4402->4408': 6,   // U4   Heiligenstadt → Schottenring
  '4402->4410': 8,   // U4   Heiligenstadt → Schwedenplatz
  '4214->4263': 3,   // U2   Schottenring → Praterstern
  '4113->4117': 2,   // U1   Schwedenplatz → Praterstern
  '1221->1226': 4,   // 38   Grinzing → Oberdöbling
  '1288->4648': 9,   // S45  Oberdöbling → Handelskai
  '4648->1290201': 4  // mainline  Handelskai → Praterstern
};

function getDuration(depStop, arrStop) {
  return DURATIONS[`${depStop}->${arrStop}`] ?? null;
}

// ─── DATA HELPERS ─────────────────────────────────────────────────────────────

// Get departures for a specific line name at a stop, sorted by planned time.
// Special value 'MAINLINE' returns departures across all HANDELSKAI_LINES combined.
function getDepartures(stopId, lineName) {
  const lines = stopData[stopId] ?? [];
  let matchedLines;
  if (lineName === 'MAINLINE') {
    matchedLines = lines.filter(l => HANDELSKAI_LINES.includes(l.name?.toUpperCase().replace(/\s+/g, '')));
  } else {
    const match = lines.find(l => l.name?.toUpperCase() === lineName?.toUpperCase());
    matchedLines = match ? [match] : [];
  }
  const deps = [];
  matchedLines.forEach(line => {
    (line.departures?.departure ?? []).forEach(d => {
      deps.push({
        planned: new Date(d.departureTime.timePlanned),
        real: new Date(d.departureTime.timeReal),
        countdown: d.departureTime.countdown
      });
    });
  });
  return deps.sort((a, b) => a.planned - b.planned);
}

// Derive arrival times from departure time + scheduled duration.
// arrPlanned = depPlanned + duration
// arrReal    = depReal    + duration  (same vehicle, delay carried through)
function calcArrival(depPlanned, depReal, depStop, arrStop) {
  const dur = getDuration(depStop, arrStop);
  if (dur === null) return { arrPlanned: null, arrReal: null };
  const ms = dur * 60000;
  return {
    arrPlanned: new Date(depPlanned.getTime() + ms),
    arrReal:    new Date(depReal.getTime()    + ms)
  };
}

// Delta in minutes: positive = late, negative = early
function deltaMin(real, planned) {
  return Math.round((real - planned) / 60000);
}

function fmtTime(date) {
  if (!date) return '--:--';
  return date.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' });
}

function deltaHTML(real, planned) {
  if (!real || !planned) return '';
  const d = deltaMin(real, planned);
  if (d === 0) return '';
  const cls = d > 0 ? 'late' : 'early';
  const sign = d > 0 ? '+' : '';
  return `<span class="time-delta ${cls}">${sign}${d} min</span>`;
}

// ─── ROUTE RESOLUTION ─────────────────────────────────────────────────────────

// For a given start departure resolve all segments using:
// - Live departure times from API for each segment's depStop
// - Arrival times derived from depReal + scheduled duration
// - Transfer time = depReal of next segment minus arrReal of previous segment
function resolveRoute(route, startDep) {
  const segments = [];
  let prevArrPlanned = null;
  let prevArrReal    = null;

  for (let i = 0; i < route.segments.length; i++) {
    const seg = route.segments[i];

    let depPlanned, depReal;

    if (i === 0) {
      // First segment uses the top-level departure being rendered
      depPlanned = startDep.planned;
      depReal    = startDep.real;
    } else {
      // Later segments: find the first live departure of this line at depStop
      // that is on or after prevArrPlanned (earliest possible arrival at transfer)
      const deps = getDepartures(seg.depStop, seg.line);
      const candidate = deps.find(d => d.planned >= prevArrPlanned);
      if (!candidate) return null; // no connecting service in data window
      depPlanned = candidate.planned;
      depReal    = candidate.real;
    }

    // Arrival = departure + scheduled duration for this stop pair
    const { arrPlanned, arrReal } = calcArrival(depPlanned, depReal, seg.depStop, seg.arrStop);

    // Transfer allowance: actual minutes between previous arrival (real) and
    // this departure (real). Only meaningful from segment 2 onwards.
    let transferActualMin = null;
    if (i > 0 && prevArrReal && depReal) {
      transferActualMin = Math.round((depReal - prevArrReal) / 60000);
    }

    segments.push({
      ...seg,
      depPlanned,
      depReal,
      arrPlanned,
      arrReal,
      transferAllowance:  seg.transferFromPrev ?? null,
      transferActualMin
    });

    // Pass this segment's arrival forward for next iteration
    prevArrPlanned = arrPlanned ?? depPlanned;
    prevArrReal    = arrReal    ?? depReal;
  }

  return segments;
}

// ─── RENDERING ────────────────────────────────────────────────────────────────

function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Get top-3 departures for each group's start stop & line
  const groupADeps = getTopDepartures(873, '38A', 3);
  const groupBDeps = getTopDepartures(1221, '38', 3);

  // Group A
  const groupALabel = document.createElement('div');
  groupALabel.className = 'group-label';
  groupALabel.textContent = 'Routes from Grinzing Bus 38A → Praterstern';
  main.appendChild(groupALabel);

  if (groupADeps.length === 0) {
    main.appendChild(noDataEl('No departure data for Bus 38A at Grinzing'));
  } else {
    groupADeps.forEach((dep, idx) => {
      main.appendChild(renderDepCard(dep, idx + 1, GROUP_A));
    });
  }

  // Group B
  const groupBLabel = document.createElement('div');
  groupBLabel.className = 'group-label';
  groupBLabel.textContent = 'Routes from Grinzing Tram 38 → Handelskai';
  main.appendChild(groupBLabel);

  if (groupBDeps.length === 0) {
    main.appendChild(noDataEl('No departure data for Tram 38 at Grinzing'));
  } else {
    groupBDeps.forEach((dep, idx) => {
      main.appendChild(renderDepCard(dep, idx + 1, GROUP_B));
    });
  }
}

function getTopDepartures(stopId, lineName, n) {
  return getDepartures(stopId, lineName).slice(0, n);
}

function noDataEl(msg) {
  const d = document.createElement('div');
  d.className = 'error-msg';
  d.textContent = msg;
  return d;
}

function renderDepCard(dep, num, routeIds) {
  const card = document.createElement('div');
  card.className = 'dep-card';

  // Departure header
  const dh = document.createElement('div');
  dh.className = 'dep-header';

  const dn = document.createElement('div');
  dn.className = 'dep-num';
  dn.textContent = `DEPARTURE ${num}`;

  const dt = document.createElement('div');
  dt.className = 'dep-time';
  dt.textContent = fmtTime(dep.real);

  const dd = document.createElement('div');
  dd.className = 'dep-delta';
  const dm = deltaMin(dep.real, dep.planned);
  if (dm === 0) {
    dd.className += ' ontime';
    dd.textContent = 'On time';
  } else if (dm > 0) {
    dd.className += ' late';
    dd.textContent = `+${dm} min`;
  } else {
    dd.className += ' early';
    dd.textContent = `${dm} min`;
  }

  const lineBadge = document.createElement('div');
  lineBadge.className = 'dep-line-badge';
  lineBadge.textContent = `Plan: ${fmtTime(dep.planned)}`;

  dh.appendChild(dn);
  dh.appendChild(dt);
  dh.appendChild(dd);
  dh.appendChild(lineBadge);
  card.appendChild(dh);

  // Route blocks
  routeIds.forEach(rid => {
    const route = ROUTES.find(r => r.id === rid);
    if (!route) return;
    // Only resolve routes that share the same start stop/line as this dep
    if (route.startStop !== dep.planned.getTime && true) {
      const segs = resolveRoute(route, dep);
      card.appendChild(renderRouteBlock(route, segs));
    }
  });

  return card;
}

function renderRouteBlock(route, segments) {
  const block = document.createElement('div');
  block.className = 'route-block';

  // Route header
  const rh = document.createElement('div');
  rh.className = 'route-header';

  const rb = document.createElement('div');
  rb.className = 'route-badge';
  rb.textContent = route.id;

  const rn = document.createElement('div');
  rn.className = 'route-name';
  rn.textContent = route.name;

  rh.appendChild(rb);
  rh.appendChild(rn);

  if (segments) {
    const lastSeg = segments[segments.length - 1];
    const startTime = fmtTime(segments[0].depReal);
    const endTime = fmtTime(lastSeg.arrReal ?? lastSeg.arrPlanned);
    const rs = document.createElement('div');
    rs.className = 'route-summary';
    rs.textContent = `${startTime} → ${endTime}`;
    rh.appendChild(rs);
  }

  block.appendChild(rh);

  if (!segments) {
    const nd = document.createElement('div');
    nd.className = 'no-routes';
    nd.textContent = 'No connecting service data available';
    block.appendChild(nd);
    return block;
  }

  // Segment table
  const table = document.createElement('table');
  table.className = 'seg-table';

  const thead = document.createElement('thead');
  thead.innerHTML = `<tr>
    <th>Segment</th>
    <th>Line</th>
    <th>Departs</th>
    <th>Arrives</th>
  </tr>`;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  segments.forEach((seg, i) => {
    // Transfer row (before segment if not first)
    if (i > 0 && seg.transferAllowance !== null) {
      const tr = document.createElement('tr');
      tr.className = 'transfer-row';
      const transferMin = seg.transferActualMin !== null
        ? seg.transferActualMin
        : seg.transferAllowance;
      const transferDisplay = seg.transferActualMin !== null
        ? `${seg.transferActualMin} min available`
        : `${seg.transferAllowance} min allowed`;
      tr.innerHTML = `
        <td colspan="3"><span class="transfer-label">⇄ Transfer Allowance</span></td>
        <td class="transfer-time">${transferDisplay}</td>
      `;
      tbody.appendChild(tr);
    }

    // Segment row
    const tr = document.createElement('tr');

    const depDelta = seg.depReal && seg.depPlanned ? deltaHTML(seg.depReal, seg.depPlanned) : '';
    const arrDelta = seg.arrReal && seg.arrPlanned ? deltaHTML(seg.arrReal, seg.arrPlanned) : '';

    tr.innerHTML = `
      <td class="seg-name">${seg.name}</td>
      <td class="seg-line">${seg.label}</td>
      <td class="time-cell">${fmtTime(seg.depReal || seg.depPlanned)}${depDelta}</td>
      <td class="time-cell">${seg.arrPlanned ? fmtTime(seg.arrReal || seg.arrPlanned) + arrDelta : '<span style="color:var(--text-dim)">—</span>'}</td>
    `;
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  block.appendChild(table);
  return block;
}
